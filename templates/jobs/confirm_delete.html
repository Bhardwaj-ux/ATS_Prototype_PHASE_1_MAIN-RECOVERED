{% extends 'base.html' %}

{% block title %}Delete Job | ATS Platform{% endblock %}

{% block content %}
<section class="page-header">
  <div>
    <h1>Delete Job</h1>
    <p>Are you sure you want to delete <strong>{{ job.title }}</strong>? This cannot be undone.</p>
  </div>
</section>

<form method="post" class="card" style="max-width: 520px;">
  {% csrf_token %}
  <div class="form-actions" style="display:flex; gap:12px;">
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'jobs:list' %}" class="btn btn-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
