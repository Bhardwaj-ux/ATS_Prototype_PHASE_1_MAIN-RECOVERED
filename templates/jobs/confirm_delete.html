{% extends 'base.html' %}
{% block title %}Delete Job | ATS Resume Bot{% endblock %}
{% block content %}
<div class="card">
    <h1 class="page-title">Delete Job</h1>
    <p>Are you sure you want to delete this job?</p>
    <p><strong>{{ job.title }}</strong></p>

    <form method="post">
        {% csrf_token %}
        <div class="actions" style="margin-top:16px;">
            <button class="btn btn-primary" type="submit" onclick="return confirm('Delete this job?');">Yes, Delete</button>
            <a class="btn" href="{% url 'jobs:list' %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
