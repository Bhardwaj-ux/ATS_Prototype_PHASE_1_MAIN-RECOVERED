{% extends 'base.html' %}
{% block title %}Job Form | ATS Resume Bot{% endblock %}
{% block content %}
<div class="card" style="max-width:900px;">
    <h1 class="page-title">Job Form</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="actions" style="margin-top:16px;">
            <button class="btn btn-primary" type="submit">Save Job</button>
            <a class="btn" href="{% url 'jobs:list' %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
