{% extends 'base.html' %}

{% block title %}Upload Resume | ATS Workspace{% endblock %}

{% block content %}
<section class="page-header">
  <div>
    <h1>Upload Resume</h1>
    <p>Attach a PDF, DOC, or DOCX file to a candidate application.</p>
  </div>
</section>

<form method="post" enctype="multipart/form-data" class="card" style="max-width: 620px;">
  {% csrf_token %}
  {{ form.as_p }}
  <div class="form-actions" style="display:flex; gap:12px; margin-top:16px;">
    <button type="submit" class="btn btn-primary">Upload</button>
    <a href="{% url 'applications:list' %}" class="btn btn-secondary">Back</a>
  </div>
</form>
{% endblock %}
